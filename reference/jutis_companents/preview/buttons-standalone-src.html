<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Jutis · Buttons</title>
<template id="__bundler_thumbnail" data-bg-color="#13161b">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#13161b"/>
    <rect x="420" y="340" width="360" height="120" rx="60" fill="#dce87a"/>
    <rect x="460" y="380" width="60" height="40" rx="8" fill="#13161b"/>
    <rect x="540" y="385" width="200" height="30" rx="6" fill="#13161b"/>
  </svg>
</template>
<style>body{background:#13161b}</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  html,body{margin:0;background:#13161b;font-family:'Inter',system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
  :root{--lime:#dce87a;--card:#1a1d23;--line:#2e323c;--mute:#9aa1ac;--fg:#e6e8ec;--ink:#0a0b0f}

  .card{
    width:700px;padding:24px;box-sizing:border-box;color:var(--fg);position:relative;overflow:hidden;
    background:radial-gradient(1000px 260px at 110% -8%, rgba(220,232,122,.12), transparent 60%),linear-gradient(180deg,#1c1f25,#101318);
    border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    display:flex;flex-direction:column;gap:14px
  }
  .card::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:
      linear-gradient(to right,rgba(255,255,255,.02) 1px,transparent 1px),
      linear-gradient(to bottom,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 90%)}

  .head{position:relative;display:flex;align-items:center;justify-content:space-between;z-index:2}
  .eyebrow{font:600 9px 'JetBrains Mono';letter-spacing:.28em;text-transform:uppercase;color:var(--mute);display:inline-flex;align-items:center;gap:9px}
  .eyebrow .d{width:7px;height:7px;border-radius:9999px;background:var(--lime);box-shadow:0 0 0 3px rgba(220,232,122,.12),0 0 12px var(--lime);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(220,232,122,.12),0 0 12px var(--lime)}50%{box-shadow:0 0 0 6px rgba(220,232,122,.05),0 0 20px var(--lime)}}
  .eyebrow .sep{color:#4a4f5a;font-weight:400;letter-spacing:.1em}
  .count{font:600 10px 'JetBrains Mono';color:var(--mute);display:inline-flex;align-items:center;gap:8px}
  .count .dot{width:4px;height:4px;background:var(--mute);border-radius:9999px}

  .section{position:relative;z-index:2}
  .lab{font:600 9px 'JetBrains Mono';letter-spacing:.22em;text-transform:uppercase;color:var(--mute);margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .lab::before{content:'';width:4px;height:4px;background:var(--lime);border-radius:9999px;box-shadow:0 0 6px var(--lime)}
  .lab .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  /* ── button base ── */
  .btn{
    position:relative;display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9999px;
    font-family:'Inter';font-weight:700;font-size:13px;cursor:pointer;border:none;letter-spacing:.01em;
    transition:transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .25s, background .25s, color .25s;
    overflow:hidden;isolation:isolate
  }
  .btn:active{transform:translateY(1px) scale(.98)}
  .btn .material-symbols-outlined{font-size:17px;transition:transform .3s cubic-bezier(.2,.8,.2,1)}

  /* shimmer sheen that sweeps on hover */
  .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);transform:translateX(-120%);transition:transform .7s cubic-bezier(.2,.8,.2,1);pointer-events:none;mix-blend-mode:overlay}
  .btn:hover::before{transform:translateX(120%)}

  .btn.primary{background:var(--fg);color:var(--card);box-shadow:inset 0 0 0 1px rgba(0,0,0,.05),0 2px 0 rgba(255,255,255,.04)}
  .btn.primary:hover{background:#fff;box-shadow:0 6px 20px rgba(255,255,255,.1),inset 0 0 0 1px rgba(0,0,0,.05);transform:translateY(-1px)}
  .btn.primary:hover .material-symbols-outlined{transform:translate(2px,-2px)}

  .btn.accent{background:var(--lime);color:var(--card)}
  .btn.accent:hover{background:#e8f48e;transform:translateY(-1px);box-shadow:0 8px 22px rgba(220,232,122,.3)}

  /* gradient hero w/ animated conic glow */
  .btn.grad{
    background:linear-gradient(135deg,#eaf18b 0%,#dce87a 50%,#c8d96a 100%);color:var(--ink);padding:12px 22px;
    box-shadow:0 0 0 1px rgba(220,232,122,.4),0 10px 30px -6px rgba(220,232,122,.35),inset 0 1px 0 rgba(255,255,255,.4);
  }
  .btn.grad::after{content:'';position:absolute;inset:-2px;z-index:-1;border-radius:inherit;background:conic-gradient(from 0deg,transparent 0deg,rgba(220,232,122,.8) 80deg,transparent 140deg,transparent 260deg,rgba(255,255,255,.7) 320deg,transparent 360deg);animation:gradSpin 3.6s linear infinite;filter:blur(3px);opacity:.85}
  @keyframes gradSpin{to{transform:rotate(360deg)}}
  .btn.grad:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(220,232,122,.6),0 14px 40px -4px rgba(220,232,122,.55),inset 0 1px 0 rgba(255,255,255,.5)}
  .btn.grad .material-symbols-outlined{animation:boltFlicker 2.2s ease-in-out infinite}
  @keyframes boltFlicker{0%,92%,100%{filter:drop-shadow(0 0 0 transparent) rotate(0)}94%{filter:drop-shadow(0 0 4px #fff);transform:rotate(-8deg)}96%{filter:drop-shadow(0 0 2px #fff);transform:rotate(6deg)}}

  .btn.outline{background:rgba(10,11,15,.4);color:var(--fg);border:1px solid var(--line)}
  .btn.outline:hover{border-color:rgba(220,232,122,.45);color:var(--lime);box-shadow:0 0 0 3px rgba(220,232,122,.08)}
  .btn.outline:hover .kbd{border-color:rgba(220,232,122,.3);color:var(--lime)}

  .btn.ghost{background:transparent;color:var(--mute)}
  .btn.ghost:hover{color:var(--fg);background:rgba(255,255,255,.04)}
  .btn.ghost .material-symbols-outlined{font-size:14px;opacity:.5;transition:all .3s}
  .btn.ghost:hover .material-symbols-outlined{opacity:1;transform:translateX(3px)}

  .btn.danger{background:transparent;color:#f87171;border:1px solid rgba(248,113,113,.3)}
  .btn.danger:hover{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.6);box-shadow:0 0 0 3px rgba(248,113,113,.1)}

  /* loading state */
  .btn.loading{background:rgba(220,232,122,.15);color:var(--lime);border:1px solid rgba(220,232,122,.3);padding-left:16px}
  .btn.loading .ring{width:12px;height:12px;border-radius:50%;border:2px solid rgba(220,232,122,.25);border-top-color:var(--lime);animation:ringSpin .9s linear infinite}
  @keyframes ringSpin{to{transform:rotate(360deg)}}

  /* success state */
  .btn.success{background:rgba(134,239,172,.14);color:#86efac;border:1px solid rgba(134,239,172,.35);padding-left:16px}
  .btn.success svg{width:14px;height:14px;stroke:#86efac;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:24;stroke-dashoffset:24;animation:check .7s cubic-bezier(.2,.8,.2,1) .1s forwards infinite alternate}
  @keyframes check{to{stroke-dashoffset:0}}

  /* icon buttons */
  .icon-btn{
    position:relative;padding:0;width:40px;height:40px;background:linear-gradient(160deg,#232730,#1a1d23);
    border:1px solid var(--line);border-radius:12px;color:var(--mute);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.03);transition:all .25s;overflow:hidden
  }
  .icon-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(220,232,122,.22),transparent 55%);opacity:0;transition:opacity .3s;pointer-events:none}
  .icon-btn:hover{color:var(--fg);border-color:rgba(220,232,122,.3);transform:translateY(-1px)}
  .icon-btn:hover::after{opacity:1}
  .icon-btn:hover .material-symbols-outlined{transform:scale(1.08);color:var(--lime)}
  .icon-btn .material-symbols-outlined{font-size:18px;transition:all .25s;position:relative;z-index:1}
  .icon-btn.active{color:var(--lime);border-color:rgba(220,232,122,.35);background:rgba(220,232,122,.1);box-shadow:inset 0 0 0 1px rgba(220,232,122,.08),0 0 12px rgba(220,232,122,.12)}
  .icon-btn .pulse{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:9999px;background:var(--lime);box-shadow:0 0 8px var(--lime);z-index:2;animation:dotPing 1.6s ease-out infinite}
  .icon-btn .pulse::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1.5px solid var(--lime);animation:ringExpand 1.6s ease-out infinite;opacity:0}
  @keyframes dotPing{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes ringExpand{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.8);opacity:0}}

  /* segmented */
  .seg{display:inline-flex;padding:3px;background:rgba(10,11,15,.5);border:1px solid var(--line);border-radius:12px;position:relative;gap:2px}
  .seg button{position:relative;padding:7px 13px;border:none;background:transparent;color:var(--mute);font:600 11px 'Inter';cursor:pointer;border-radius:9px;transition:color .2s;letter-spacing:.04em;z-index:1;display:inline-flex;align-items:center;gap:5px}
  .seg button .material-symbols-outlined{font-size:14px}
  .seg button.on{color:var(--ink)}
  .seg .thumb{position:absolute;top:3px;bottom:3px;background:var(--lime);border-radius:9px;box-shadow:0 2px 12px rgba(220,232,122,.35);transition:all .45s cubic-bezier(.2,.8,.2,1);z-index:0}

  .kbd{font:600 10px 'JetBrains Mono';color:var(--mute);padding:2px 6px;background:var(--ink);border:1px solid var(--line);border-radius:4px;margin-left:4px;transition:all .25s}

  .hint{font:500 9px 'JetBrains Mono';color:#4a4f5a;margin-left:auto;letter-spacing:.15em;text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
  .hint::before{content:'';width:14px;height:1px;background:#4a4f5a}
</style></head>
<body>
<div class="card">
  <div class="head">
    <div class="eyebrow"><span class="d"></span>Buttons · Motion States<span class="sep">/</span><span style="color:var(--lime)">hover · load · done</span></div>
    <div class="count"><span class="dot"></span>4 rows<span class="dot"></span>14 variants</div>
  </div>

  <div class="section">
    <div class="lab">Primary CTAs<span class="rule"></span><span class="hint">hover me</span></div>
    <div class="row">
      <button class="btn primary">Sign Up</button>
      <button class="btn primary">Open Jutis<span class="material-symbols-outlined">arrow_outward</span></button>
      <button class="btn accent">Add Wallet</button>
      <button class="btn grad"><span class="material-symbols-outlined">bolt</span>Swap Now</button>
    </div>
  </div>

  <div class="section">
    <div class="lab">Secondary · Ghost · Danger<span class="rule"></span></div>
    <div class="row">
      <button class="btn outline">Login<span class="kbd">⌘L</span></button>
      <button class="btn outline"><span class="material-symbols-outlined">code</span>View Docs</button>
      <button class="btn ghost">Forgot password?<span class="material-symbols-outlined">chevron_right</span></button>
      <button class="btn danger"><span class="material-symbols-outlined">logout</span>Disconnect</button>
    </div>
  </div>

  <div class="section">
    <div class="lab">Async states · Segmented<span class="rule"></span></div>
    <div class="row">
      <button class="btn loading"><span class="ring"></span>Signing…</button>
      <button class="btn success"><svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-11"/></svg>Confirmed</button>
      <div class="seg" id="seg">
        <span class="thumb" id="segThumb"></span>
        <button class="on" data-i="0"><span class="material-symbols-outlined">send</span>Send</button>
        <button data-i="1"><span class="material-symbols-outlined">download</span>Receive</button>
        <button data-i="2"><span class="material-symbols-outlined">swap_horiz</span>Swap</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="lab">Icon buttons<span class="rule"></span></div>
    <div class="row">
      <button class="icon-btn active"><span class="material-symbols-outlined">notifications</span><span class="pulse"></span></button>
      <button class="icon-btn"><span class="material-symbols-outlined">menu</span></button>
      <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
      <button class="icon-btn"><span class="material-symbols-outlined">search</span></button>
      <button class="icon-btn"><span class="material-symbols-outlined">qr_code</span></button>
      <button class="icon-btn"><span class="material-symbols-outlined">more_horiz</span></button>
    </div>
  </div>
</div>

<script>
  // Segmented slider thumb
  const seg = document.getElementById('seg');
  const thumb = document.getElementById('segThumb');
  const buttons = seg.querySelectorAll('button');
  function place(i){
    const b = buttons[i];
    thumb.style.left = b.offsetLeft + 'px';
    thumb.style.width = b.offsetWidth + 'px';
    buttons.forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
  }
  buttons.forEach((b,i)=>b.addEventListener('click',()=>place(i)));
  requestAnimationFrame(()=>place(0));

  // demo auto-cycle so the motion reads in static review
  let idx=0;
  setInterval(()=>{ idx=(idx+1)%buttons.length; place(idx); }, 1800);

  // spotlight cursor on icon buttons
  document.querySelectorAll('.icon-btn').forEach(b=>{
    b.addEventListener('mousemove',e=>{
      const r=b.getBoundingClientRect();
      b.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');
      b.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');
    });
  });
</script>
</body></html>
