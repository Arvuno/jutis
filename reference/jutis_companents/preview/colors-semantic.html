<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Semantic colors</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:transparent}
  .card{
    width:700px;padding:22px;box-sizing:border-box;
    background:
      radial-gradient(circle at 100% 0%, rgba(74,222,128,.04), transparent 50%),
      radial-gradient(circle at 0% 100%, rgba(248,113,113,.04), transparent 50%),
      linear-gradient(180deg,#1a1d23 0%,#13161b 100%);
    color:#e6e8ec;font-family:'Inter',system-ui;
    border:1px solid #2e323c;position:relative;overflow:hidden
  }
  .card::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(46,50,60,.5) 1px,transparent 1px);
    background-size:22px 22px;opacity:.3
  }
  .head{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .eyebrow{font:700 9px 'Inter';letter-spacing:.28em;text-transform:uppercase;color:#9aa1ac;display:inline-flex;align-items:center;gap:8px}
  .eyebrow .d{width:6px;height:6px;border-radius:9999px;background:#dce87a;box-shadow:0 0 10px #dce87a}
  .count{font:500 10px 'JetBrains Mono';color:#9aa1ac}

  .grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .pill{
    position:relative;border-radius:14px;padding:14px 14px 12px;overflow:hidden;
    border:1px solid;background:linear-gradient(160deg,rgba(255,255,255,.02),transparent);
  }
  .pill .edge{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 14px}
  .pill .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .pill .dot{width:28px;height:28px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:14px;color:inherit;background:currentColor;mix-blend-mode:normal;position:relative}
  .pill .dot span{color:#1a1d23;font-weight:800;font-family:'Plus Jakarta Sans'}
  .pill .dot.wave{background:transparent;border:1.5px solid currentColor}
  .pill .dot.wave::after{content:'';position:absolute;inset:-4px;border:1.5px solid currentColor;border-radius:9999px;opacity:.35;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.6}100%{transform:scale(1.4);opacity:0}}
  .pill .hex{font:500 10px 'JetBrains Mono';opacity:.7}
  .pill .lab{font:700 9px 'Inter';letter-spacing:.2em;text-transform:uppercase;opacity:.85}
  .pill .val{font:800 18px 'Plus Jakarta Sans';letter-spacing:-.01em;margin-top:6px;line-height:1}
  .pill .sub{font:400 11px 'Inter';opacity:.7;margin-top:3px}

  .p-ok{color:#4ade80;background:linear-gradient(160deg,rgba(74,222,128,.10),rgba(74,222,128,.02));border-color:rgba(74,222,128,.28)}
  .p-err{color:#f87171;background:linear-gradient(160deg,rgba(248,113,113,.10),rgba(248,113,113,.02));border-color:rgba(248,113,113,.28)}
  .p-warn{color:#f59e0b;background:linear-gradient(160deg,rgba(245,158,11,.10),rgba(245,158,11,.02));border-color:rgba(245,158,11,.28)}
  .p-info{color:#4a9eff;background:linear-gradient(160deg,rgba(74,158,255,.10),rgba(74,158,255,.02));border-color:rgba(74,158,255,.28)}
</style></head>
<body>
<div class="card">
  <div class="head">
    <div class="eyebrow"><span class="d"></span>Semantic Signals · State Palette</div>
    <div class="count">4 · WCAG AA on #1a1d23</div>
  </div>

  <div class="grid">
    <div class="pill p-ok">
      <div class="edge" style="background:currentColor"></div>
      <div class="top"><div class="dot"><span>↑</span></div><div class="hex">#4ade80</div></div>
      <div class="lab">Success</div>
      <div class="val">+500.00</div>
      <div class="sub">Swap confirmed</div>
    </div>

    <div class="pill p-err">
      <div class="edge" style="background:currentColor"></div>
      <div class="top"><div class="dot"><span>×</span></div><div class="hex">#f87171</div></div>
      <div class="lab">Danger</div>
      <div class="val">−125.00</div>
      <div class="sub">Tx reverted</div>
    </div>

    <div class="pill p-warn">
      <div class="edge" style="background:currentColor"></div>
      <div class="top"><div class="dot"><span>!</span></div><div class="hex">#f59e0b</div></div>
      <div class="lab">Warning</div>
      <div class="val">2m left</div>
      <div class="sub">Session expiring</div>
    </div>

    <div class="pill p-info">
      <div class="edge" style="background:currentColor"></div>
      <div class="top"><div class="dot wave"></div><div class="hex">#4a9eff</div></div>
      <div class="lab">Pending</div>
      <div class="val">Block 4,219</div>
      <div class="sub">Awaiting consensus</div>
    </div>
  </div>
</div>
</body></html>
