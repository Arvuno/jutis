<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Surfaces</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:transparent}
  .wrap{width:700px;padding:20px;background:#0a0b0f;font-family:var(--font-sans);box-sizing:border-box;border:1px solid var(--border)}
  .stack{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .surf{border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:92px;justify-content:flex-end;border:1px solid var(--border)}
  .nm{font:700 11px/1 var(--font-display);letter-spacing:.12em;text-transform:uppercase;color:#e6e8ec}
  .hex{font:500 10px var(--font-mono);color:#9aa1ac}
  .lab{font:400 10px var(--font-sans);color:#9aa1ac}
</style></head>
<body><div class="wrap">
  <div class="stack">
    <div class="surf" style="background:#0a0b0f"><div class="lab">Bridge / immersive</div><div class="nm">DEEP</div><div class="hex">#0a0b0f</div></div>
    <div class="surf" style="background:#1a1d23"><div class="lab">Default page</div><div class="nm">MAIN</div><div class="hex">#1a1d23</div></div>
    <div class="surf" style="background:#232730"><div class="lab">Card</div><div class="nm">CARD</div><div class="hex">#232730</div></div>
    <div class="surf" style="background:#181a21"><div class="lab">Cyber elev</div><div class="nm">ELEV-1</div><div class="hex">#181a21</div></div>
  </div>
</div></body></html>
