<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Token Colors</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:transparent}
  .card{
    width:700px;padding:22px;box-sizing:border-box;
    background:
      radial-gradient(circle at 50% -20%, rgba(220,232,122,.06), transparent 45%),
      linear-gradient(180deg,#1a1d23 0%,#13161b 100%);
    color:#e6e8ec;font-family:'Inter',system-ui;
    border:1px solid #2e323c;position:relative;overflow:hidden
  }
  .card::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(46,50,60,.5) 1px,transparent 1px);
    background-size:22px 22px;opacity:.3
  }
  .head{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .eyebrow{font:700 9px 'Inter';letter-spacing:.28em;text-transform:uppercase;color:#9aa1ac;display:inline-flex;align-items:center;gap:8px}
  .eyebrow .d{width:6px;height:6px;border-radius:9999px;background:#dce87a;box-shadow:0 0 10px #dce87a}
  .count{font:500 10px 'JetBrains Mono';color:#9aa1ac}

  .grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .tok{
    position:relative;border-radius:16px;padding:14px;overflow:hidden;
    background:linear-gradient(160deg,#232730 0%,#1c1f27 100%);
    border:1px solid rgba(255,255,255,.04);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 8px 24px -12px rgba(0,0,0,.5);
  }
  .tok .aura{
    position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:9999px;
    filter:blur(28px);opacity:.45
  }
  .tok .row{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .chip{
    width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font:800 16px 'Plus Jakarta Sans';
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 6px 14px -6px currentColor;
  }
  .tick{font:500 9px 'JetBrains Mono';color:#9aa1ac;letter-spacing:.05em}
  .tick.up{color:#4ade80}
  .tick.dn{color:#f87171}
  .sym{font:700 15px 'Plus Jakarta Sans';letter-spacing:.01em;color:#e6e8ec}
  .hex{font:500 10px 'JetBrains Mono';color:#9aa1ac;margin-top:2px}
  .spark{display:flex;align-items:flex-end;gap:2px;height:20px;margin-top:12px}
  .spark i{flex:1;background:currentColor;border-radius:1px;opacity:.45}

  .c-cant{color:#dce87a}
  .c-usdc{color:#4a9eff}
  .c-weth{color:#8ea3f0}
  .c-wbtc{color:#f7931a}
</style></head>
<body>
<div class="card">
  <div class="head">
    <div class="eyebrow"><span class="d"></span>Token Chromatics · Canton</div>
    <div class="count">4 supported · live</div>
  </div>

  <div class="grid">
    <div class="tok c-cant">
      <div class="aura" style="background:#dce87a"></div>
      <div class="row">
        <div class="chip" style="background:rgba(220,232,122,.15);color:#dce87a">C</div>
        <div class="tick up">+2.4%</div>
      </div>
      <div class="sym">CANT</div>
      <div class="hex">#dce87a</div>
      <div class="spark"><i style="height:40%"></i><i style="height:55%"></i><i style="height:48%"></i><i style="height:62%"></i><i style="height:70%"></i><i style="height:66%"></i><i style="height:85%"></i><i style="height:92%"></i></div>
    </div>

    <div class="tok c-usdc">
      <div class="aura" style="background:#4a9eff"></div>
      <div class="row">
        <div class="chip" style="background:rgba(74,158,255,.15);color:#4a9eff">$</div>
        <div class="tick">±0.01%</div>
      </div>
      <div class="sym">USDC</div>
      <div class="hex">#4a9eff</div>
      <div class="spark"><i style="height:50%"></i><i style="height:51%"></i><i style="height:49%"></i><i style="height:50%"></i><i style="height:52%"></i><i style="height:50%"></i><i style="height:51%"></i><i style="height:50%"></i></div>
    </div>

    <div class="tok c-weth">
      <div class="aura" style="background:#627eea"></div>
      <div class="row">
        <div class="chip" style="background:rgba(98,126,234,.15);color:#8ea3f0">Ξ</div>
        <div class="tick up">+5.1%</div>
      </div>
      <div class="sym">WETH</div>
      <div class="hex">#627eea</div>
      <div class="spark"><i style="height:30%"></i><i style="height:45%"></i><i style="height:52%"></i><i style="height:48%"></i><i style="height:65%"></i><i style="height:72%"></i><i style="height:80%"></i><i style="height:78%"></i></div>
    </div>

    <div class="tok c-wbtc">
      <div class="aura" style="background:#f7931a"></div>
      <div class="row">
        <div class="chip" style="background:rgba(247,147,26,.15);color:#f7931a">₿</div>
        <div class="tick dn">−1.2%</div>
      </div>
      <div class="sym">WBTC</div>
      <div class="hex">#f7931a</div>
      <div class="spark"><i style="height:80%"></i><i style="height:75%"></i><i style="height:82%"></i><i style="height:70%"></i><i style="height:68%"></i><i style="height:62%"></i><i style="height:64%"></i><i style="height:58%"></i></div>
    </div>
  </div>
</div>
</body></html>
