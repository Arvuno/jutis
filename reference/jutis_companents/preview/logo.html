<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Logo & Lockup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:transparent;font-family:'Inter',system-ui}
  :root{--lime:#dce87a;--ink:#13161b;--card:#1a1d23;--line:#2e323c;--mute:#9aa1ac;--fg:#e6e8ec}

  .card{
    width:700px;padding:24px;box-sizing:border-box;color:var(--fg);position:relative;overflow:hidden;
    background:
      radial-gradient(1100px 280px at 110% -10%, rgba(220,232,122,.14), transparent 55%),
      linear-gradient(180deg,#1c1f25,#101318);
    border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.03)
  }
  .card::before{content:'';position:absolute;inset:0;pointer-events:none;background-image:
      linear-gradient(to right, rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 90%)}

  .head{position:relative;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;z-index:2}
  .eyebrow{font:600 9px 'JetBrains Mono';letter-spacing:.28em;text-transform:uppercase;color:var(--mute);display:inline-flex;align-items:center;gap:9px}
  .eyebrow .d{width:7px;height:7px;border-radius:9999px;background:var(--lime);box-shadow:0 0 0 3px rgba(220,232,122,.12),0 0 12px var(--lime);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(220,232,122,.12),0 0 12px var(--lime)}50%{box-shadow:0 0 0 6px rgba(220,232,122,.05),0 0 20px var(--lime)}}
  .eyebrow .sep{color:#4a4f5a;font-weight:400;letter-spacing:.1em}
  .count{font:600 10px 'JetBrains Mono';color:var(--mute);display:inline-flex;align-items:center;gap:8px}
  .count .dot{width:4px;height:4px;background:var(--mute);border-radius:9999px}

  .grid{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;z-index:2}
  .cell{
    position:relative;border-radius:18px;padding:14px;overflow:hidden;min-height:210px;
    background:linear-gradient(160deg,rgba(35,39,48,.9),rgba(22,25,31,.9));
    border:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;backdrop-filter:blur(8px)
  }
  .cell .corner{position:absolute;width:12px;height:12px;border:1px solid rgba(220,232,122,.3)}
  .cell .c1{top:8px;left:8px;border-right:none;border-bottom:none}
  .cell .c2{top:8px;right:8px;border-left:none;border-bottom:none}
  .cell .c3{bottom:8px;left:8px;border-right:none;border-top:none}
  .cell .c4{bottom:8px;right:8px;border-left:none;border-top:none}

  .meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .idx{font:600 9px 'JetBrains Mono';color:#4a4f5a;letter-spacing:.2em}
  .idx b{color:var(--lime)}
  .badge{font:600 8px 'JetBrains Mono';color:var(--lime);padding:3px 7px;border:1px solid rgba(220,232,122,.25);border-radius:9999px;background:rgba(220,232,122,.06);letter-spacing:.1em;text-transform:uppercase}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
  .stage svg{width:120px;height:120px;overflow:visible}

  .label-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .lab{font:600 9px 'JetBrains Mono';color:var(--fg);letter-spacing:.2em;text-transform:uppercase}
  .sub{font:500 9px 'JetBrains Mono';color:var(--mute)}
  .sub .kv{padding:3px 6px;background:rgba(10,11,15,.5);border:1px solid var(--line);border-radius:4px}

  /* ─── Variant A — ASSEMBLE (loops): lines draw → diamond locks → bar ignites ─── */
  .vA .boxA{stroke:#dce87a;stroke-width:1.8;fill:none;rx:5;stroke-dasharray:88;stroke-dashoffset:88;transform-origin:16px 16px;transform:rotate(45deg);animation:drawA 4s ease-in-out infinite}
  .vA .boxB{stroke:#e6e8ec;stroke-opacity:.25;stroke-width:1;fill:none;rx:5;transform-origin:16px 16px;transform:rotate(12deg);opacity:0;animation:fadeB 4s ease-in-out infinite}
  .vA .bar{fill:#dce87a;opacity:0;animation:igniteBar 4s ease-in-out infinite;transform-origin:16px 16px}
  .vA .halo{fill:none;stroke:#dce87a;stroke-width:2;opacity:0;transform-origin:16px 16px;animation:haloBurst 4s ease-in-out infinite}
  @keyframes drawA{0%{stroke-dashoffset:88;opacity:0}15%{opacity:1}45%,100%{stroke-dashoffset:0;opacity:1}}
  @keyframes fadeB{0%,35%{opacity:0}55%,100%{opacity:1}}
  @keyframes igniteBar{0%,50%{opacity:0;transform:scaleY(0)}62%{opacity:1;transform:scaleY(1.15)}72%,100%{opacity:1;transform:scaleY(1)}}
  @keyframes haloBurst{0%,55%{opacity:0;transform:scale(.6)}65%{opacity:.7;transform:scale(1)}80%,100%{opacity:0;transform:scale(1.4)}}

  /* ─── Variant B — PULSAR: bar pulses, rings breathe concentrically ─── */
  .vB g.ring{transform-origin:16px 16px}
  .vB .r1{animation:ringBreathe 2.4s ease-in-out infinite}
  .vB .r2{animation:ringBreathe 2.4s ease-in-out infinite;animation-delay:-.4s}
  .vB .r3{animation:ringBreathe 2.4s ease-in-out infinite;animation-delay:-.8s;opacity:.4}
  @keyframes ringBreathe{0%,100%{transform:rotate(45deg) scale(.95);opacity:.9}50%{transform:rotate(45deg) scale(1.1);opacity:.3}}
  .vB .barP{fill:#dce87a;animation:barPulse 1.2s ease-in-out infinite;transform-origin:16px 16px}
  @keyframes barPulse{0%,100%{transform:scaleY(1);filter:drop-shadow(0 0 2px #dce87a)}50%{transform:scaleY(.5);filter:drop-shadow(0 0 10px #dce87a)}}
  .vB .dot{fill:#dce87a;animation:dotPing 2s ease-out infinite}
  @keyframes dotPing{0%{r:1;opacity:1}80%,100%{r:14;opacity:0}}

  /* ─── Variant C — CIPHER: morphs J→I→S glyphs inside the signet ─── */
  .vC g.shell{transform-origin:16px 16px;animation:shellSpin 12s linear infinite}
  .vC g.shellInner{transform-origin:16px 16px;animation:shellSpin 18s linear infinite reverse}
  @keyframes shellSpin{to{transform:rotate(360deg)}}
  .vC .glyph{font-family:'Plus Jakarta Sans';font-weight:800;font-size:14px;fill:#dce87a;text-anchor:middle;dominant-baseline:central;filter:drop-shadow(0 0 6px rgba(220,232,122,.6))}
  .vC .glyph{animation:glyphSwap 4.5s steps(1) infinite}
  .vC .glyph.g1{animation-delay:0s}
  .vC .glyph.g2{animation-delay:-1.5s}
  .vC .glyph.g3{animation-delay:-3s}
  @keyframes glyphSwap{0%,25%{opacity:1;transform:scale(1)}26%,100%{opacity:0;transform:scale(.6)}}
  .vC .glyph{transform-origin:16px 16px}
  .vC .tick{stroke:#dce87a;stroke-width:.6;stroke-opacity:.4;fill:none;transform-origin:16px 16px;animation:shellSpin 30s linear infinite}

  /* ─── row 2: Lockup strip (animated + favicon ladder) ─── */
  .strip{
    position:relative;z-index:2;margin-top:12px;border-radius:18px;padding:16px 18px;overflow:hidden;
    background:
      radial-gradient(600px 220px at 100% 0%, rgba(220,232,122,.16), transparent 60%),
      linear-gradient(160deg,rgba(46,50,60,.85),rgba(22,25,31,.9));
    border:1px solid rgba(220,232,122,.2);
    display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center
  }
  .strip .corner{position:absolute;width:12px;height:12px;border:1px solid rgba(220,232,122,.4)}
  .lockup{display:flex;align-items:center;gap:14px;position:relative}
  .lockup .mk{width:48px;height:48px;flex-shrink:0}
  .lockup .mk svg{width:100%;height:100%;overflow:visible}
  .lockup .mk .ringA{transform-origin:16px 16px;animation:rotA 14s linear infinite}
  .lockup .mk .ringB{transform-origin:16px 16px;animation:rotA 22s linear infinite reverse}
  .lockup .mk .barM{fill:#dce87a;animation:barPulse 1.8s ease-in-out infinite;transform-origin:16px 16px}
  @keyframes rotA{to{transform:rotate(360deg)}}
  .divider{width:1px;height:34px;background:linear-gradient(180deg,transparent,rgba(220,232,122,.6),transparent);position:relative;flex-shrink:0}
  .divider::after{content:'';position:absolute;left:-1px;top:50%;width:3px;height:3px;background:var(--lime);border-radius:50%;box-shadow:0 0 8px var(--lime);animation:divPulse 2s ease-in-out infinite}
  @keyframes divPulse{0%,100%{opacity:.4;transform:translateY(-50%) scale(1)}50%{opacity:1;transform:translateY(-50%) scale(1.4)}}
  .word{font:800 30px/1 'Plus Jakarta Sans';letter-spacing:.2em;color:var(--fg);position:relative;overflow:hidden}
  .word .l{display:inline-block;animation:letterRise .6s cubic-bezier(.2,.8,.2,1) both}
  .word .l:nth-child(1){animation-delay:.05s}
  .word .l:nth-child(2){animation-delay:.12s}
  .word .l:nth-child(3){animation-delay:.19s}
  .word .l:nth-child(4){animation-delay:.26s}
  .word .l:nth-child(5){animation-delay:.33s}
  @keyframes letterRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .word::after{content:'';position:absolute;top:0;bottom:0;left:-10%;width:30%;background:linear-gradient(100deg,transparent,rgba(220,232,122,.35),transparent);mix-blend-mode:overlay;animation:sheen 5.5s ease-in-out infinite 1.5s}
  @keyframes sheen{0%{transform:translateX(0)}60%,100%{transform:translateX(500%)}}

  .fav{display:flex;align-items:flex-end;gap:10px}
  .fav .node{display:flex;flex-direction:column;align-items:center;gap:5px}
  .fav .box{border:1px dashed rgba(255,255,255,.1);border-radius:6px;padding:3px;transition:all .3s}
  .fav .box:hover{border-color:rgba(220,232,122,.5)}
  .fav .box svg{display:block;animation:favBreath 3s ease-in-out infinite}
  .fav .node:nth-child(1) svg{animation-delay:0s}
  .fav .node:nth-child(2) svg{animation-delay:-.4s}
  .fav .node:nth-child(3) svg{animation-delay:-.8s}
  .fav .node:nth-child(4) svg{animation-delay:-1.2s}
  @keyframes favBreath{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 5px rgba(220,232,122,.9))}}
  .fav .lbl{font:500 8px 'JetBrains Mono';color:#5a5f6a;letter-spacing:.1em}

  .pick{position:absolute;top:8px;right:10px;font:600 8px 'JetBrains Mono';color:var(--lime);letter-spacing:.2em;padding:3px 7px;border:1px solid rgba(220,232,122,.4);border-radius:9999px;background:rgba(220,232,122,.08)}
  .pick::before{content:'★ ';letter-spacing:0}
</style></head>
<body>
<!-- shared favicon mark -->
<svg width="0" height="0" style="position:absolute">
  <symbol id="mkStatic" viewBox="0 0 32 32">
    <g transform="translate(16 16)">
      <rect x="-11" y="-11" width="22" height="22" fill="none" stroke="#dce87a" stroke-width="1.8" rx="5" transform="rotate(45)"/>
      <rect x="-11" y="-11" width="22" height="22" fill="none" stroke="#e6e8ec" stroke-width="1" stroke-opacity=".15" rx="5" transform="rotate(12)"/>
      <rect x="-2" y="-8" width="4" height="16" fill="#dce87a" rx="2"/>
    </g>
  </symbol>
</svg>

<div class="card">
  <div class="head">
    <div class="eyebrow"><span class="d"></span>Logo System · In-Mark Transitions<span class="sep">/</span><span style="color:var(--lime)">3 variants</span></div>
    <div class="count"><span class="dot"></span>SVG · CSS-only<span class="dot"></span>loops</div>
  </div>

  <div class="grid">
    <!-- A · Assemble (HERO PICK) -->
    <div class="cell" style="border-color:rgba(220,232,122,.3);background:linear-gradient(160deg,rgba(38,42,52,.95),rgba(24,27,33,.92))">
      <span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
      <div class="pick">Pick</div>
      <div class="meta"><div class="idx"><b>●</b> A / ASSEMBLE</div><div class="badge">Primary</div></div>
      <div class="stage">
        <svg class="vA" viewBox="0 0 32 32">
          <defs><filter id="glowA"><feGaussianBlur stdDeviation=".5"/></filter></defs>
          <circle class="halo" cx="16" cy="16" r="12"/>
          <rect class="boxB" x="5" y="5" width="22" height="22"/>
          <rect class="boxA" x="5" y="5" width="22" height="22"/>
          <rect class="bar" x="14" y="8" width="4" height="16" rx="2"/>
        </svg>
      </div>
      <div class="label-row"><div class="lab">Draw-in</div><div class="sub"><span class="kv">4s loop</span></div></div>
    </div>

    <!-- B · Pulsar -->
    <div class="cell">
      <span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
      <div class="meta"><div class="idx"><b>●</b> B / PULSAR</div><div class="badge">Loader</div></div>
      <div class="stage">
        <svg class="vB" viewBox="0 0 32 32" style="filter:drop-shadow(0 0 14px rgba(220,232,122,.35))">
          <circle class="dot" cx="16" cy="16" r="1" fill="none" stroke="#dce87a" stroke-width=".8"/>
          <g class="ring r3"><rect x="3" y="3" width="26" height="26" fill="none" stroke="#dce87a" stroke-width=".8" stroke-opacity=".4" rx="6"/></g>
          <g class="ring r2"><rect x="5" y="5" width="22" height="22" fill="none" stroke="#dce87a" stroke-width="1" stroke-opacity=".7" rx="5"/></g>
          <g class="ring r1"><rect x="7" y="7" width="18" height="18" fill="none" stroke="#dce87a" stroke-width="1.8" rx="4"/></g>
          <rect class="barP" x="14" y="8" width="4" height="16" fill="#dce87a" rx="2"/>
        </svg>
      </div>
      <div class="label-row"><div class="lab">Breathing</div><div class="sub"><span class="kv">2.4s · 1.2s</span></div></div>
    </div>

    <!-- C · Cipher -->
    <div class="cell">
      <span class="corner c1"></span><span class="corner c2"></span><span class="corner c3"></span><span class="corner c4"></span>
      <div class="meta"><div class="idx"><b>●</b> C / CIPHER</div><div class="badge">Auth</div></div>
      <div class="stage">
        <svg class="vC" viewBox="0 0 32 32">
          <g class="shell"><rect x="5" y="5" width="22" height="22" fill="none" stroke="#dce87a" stroke-width="1.6" rx="5" transform-origin="16 16" transform="rotate(45)"/></g>
          <g class="shellInner"><rect x="8" y="8" width="16" height="16" fill="none" stroke="#dce87a" stroke-width=".9" stroke-opacity=".5" rx="3" transform-origin="16 16" transform="rotate(25)"/></g>
          <circle class="tick" cx="16" cy="16" r="13" stroke-dasharray="1 3"/>
          <text class="glyph g1" x="16" y="16">J</text>
          <text class="glyph g2" x="16" y="16">I</text>
          <text class="glyph g3" x="16" y="16">S</text>
        </svg>
      </div>
      <div class="label-row"><div class="lab">Glyph-morph</div><div class="sub"><span class="kv">4.5s cycle</span></div></div>
    </div>
  </div>

  <!-- Lockup strip w/ favicon ladder -->
  <div class="strip">
    <span class="corner" style="top:8px;left:8px;border-right:none;border-bottom:none"></span>
    <span class="corner" style="top:8px;right:8px;border-left:none;border-bottom:none"></span>
    <span class="corner" style="bottom:8px;left:8px;border-right:none;border-top:none"></span>
    <span class="corner" style="bottom:8px;right:8px;border-left:none;border-top:none"></span>

    <div class="lockup">
      <div class="mk">
        <svg viewBox="0 0 32 32">
          <g class="ringA"><rect x="5" y="5" width="22" height="22" fill="none" stroke="#dce87a" stroke-width="1.8" rx="5" transform-origin="16 16" transform="rotate(45)"/></g>
          <g class="ringB"><rect x="5" y="5" width="22" height="22" fill="none" stroke="#e6e8ec" stroke-width="1" stroke-opacity=".2" rx="5" transform-origin="16 16" transform="rotate(12)"/></g>
          <rect class="barM" x="14" y="8" width="4" height="16" fill="#dce87a" rx="2"/>
        </svg>
      </div>
      <div class="divider"></div>
      <div class="word"><span class="l">J</span><span class="l">U</span><span class="l">T</span><span class="l">I</span><span class="l">S</span></div>
    </div>

    <div class="fav">
      <div class="node"><div class="box"><svg width="16" height="16"><use href="#mkStatic"/></svg></div><div class="lbl">16</div></div>
      <div class="node"><div class="box"><svg width="22" height="22"><use href="#mkStatic"/></svg></div><div class="lbl">24</div></div>
      <div class="node"><div class="box"><svg width="30" height="30"><use href="#mkStatic"/></svg></div><div class="lbl">32</div></div>
      <div class="node"><div class="box"><svg width="40" height="40"><use href="#mkStatic"/></svg></div><div class="lbl">48</div></div>
    </div>
  </div>
</div>
</body></html>
