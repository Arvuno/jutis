<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login — Jutis</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta property="og:title" content="Admin Login — Jutis">
    <meta property="og:site_name" content="Jutis">

    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>

<body class="page page--auth">

    <div class="top-accent" aria-hidden="true"></div>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 420px;">

            <div class="auth-logo">
                <a href="index.html" class="auth-logo__link">
                    <div class="auth-logo__mark" aria-hidden="true">
                        <div class="auth-logo__ring auth-logo__ring--outer"></div>
                        <div class="auth-logo__ring auth-logo__ring--inner"></div>
                        <div class="auth-logo__bar"></div>
                    </div>
                </a>
            </div>

            <div class="auth-header">
                <span class="auth-header__badge">Admin Portal</span>
                <h1 class="auth-title">Sign in to Jutis Admin</h1>
                <p class="auth-subtitle">Access the Jutis administration panel</p>
            </div>

            <form class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@jutis.xyz" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="totp">Two-Factor Code</label>
                    <input type="text" id="totp" class="form-input" placeholder="000000" maxlength="6" autocomplete="one-time-code">
                </div>
                <button type="submit" class="btn btn--accent btn--lg w-full">Sign In</button>
            </form>

            <div class="security-note">
                <span class="material-symbols-outlined" aria-hidden="true">lock</span>
                <span>This system is restricted to authorized personnel. All activities are logged and monitored.</span>
            </div>

        </div>
    </div>

    <style>
    .auth-logo {
        display: flex;
        justify-content: center;
        margin-bottom: var(--space-6);
    }

    .auth-logo__link {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .auth-logo__mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-logo__ring {
        position: absolute;
        border-radius: 12px;
        border: 2px solid var(--accent);
    }

    .auth-logo__ring--outer {
        inset: 0;
        transform: rotate(45deg) scale(0.9);
    }

    .auth-logo__ring--inner {
        inset: 5px;
        border-color: rgba(230, 232, 236, 0.25);
        transform: rotate(12deg);
    }

    .auth-logo__bar {
        position: relative;
        z-index: 1;
        width: 6px;
        height: 22px;
        background-color: var(--accent);
        border-radius: 3px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--space-6);
    }

    .auth-header__badge {
        display: inline-block;
        padding: var(--space-1) var(--space-3);
        background: rgba(183, 245, 58, 0.1);
        border: 1px solid rgba(183, 245, 58, 0.2);
        border-radius: var(--radius-pill);
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: var(--tracking-wide);
        margin-bottom: var(--space-4);
    }

    .auth-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: var(--text-2xl);
        margin-bottom: var(--space-2);
    }

    .auth-subtitle {
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
    }

    .form-label {
        font-size: var(--text-sm);
        font-weight: 500;
    }

    .form-input {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        background-color: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--fg-primary);
        font-size: var(--text-base);
        transition: border-color var(--duration-fast) var(--ease-out);
        font-family: monospace;
        text-align: center;
        letter-spacing: 0.2em;
    }

    .form-input::placeholder {
        color: var(--fg-muted);
        font-family: monospace;
        text-align: left;
        letter-spacing: normal;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-30);
    }

    .btn--accent {
        background-color: var(--accent);
        color: var(--bg-main);
        font-weight: 700;
    }

    .btn--accent:hover {
        background-color: var(--fg-primary);
    }

    .btn--lg {
        font-size: var(--text-base);
        padding: var(--space-3) var(--space-6);
    }

    .w-full { width: 100%; }

    .security-note {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        margin-top: var(--space-6);
        padding: var(--space-3) var(--space-4);
        background: rgba(234, 179, 8, 0.06);
        border: 1px solid rgba(234, 179, 8, 0.15);
        border-radius: var(--radius-md);
        font-size: var(--text-xs);
        color: #eab308;
    }

    .security-note .material-symbols-outlined {
        font-size: 16px;
        flex-shrink: 0;
    }
    </style>

</body>
</html>
