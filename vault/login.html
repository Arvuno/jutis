<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - Jutis</title>
    <meta name="description" content="Sign in to your Jutis wallet. Access your Canton ecosystem dashboard securely.">
    <meta name="robots" content="noindex">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Login - Jutis">
    <meta property="og:description" content="Sign in to your Jutis wallet.">
    <meta property="og:image" content="og-image.svg">
    <meta property="og:site_name" content="Jutis">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>

<body class="page page--atmosphere page--auth">

    <!-- BACKGROUND ATMOSPHERE -->
    <div class="bg-grid" aria-hidden="true" style="position:fixed;inset:0;pointer-events:none;opacity:0.3;z-index:0;"></div>
    <div class="atmosphere-orb atmosphere-orb--lime" aria-hidden="true"></div>
    <div class="atmosphere-orb atmosphere-orb--white" aria-hidden="true"></div>

    <!-- HEADER -->
    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="site-header__logo" aria-label="Jutis home">
                <div class="site-header__logo-mark" aria-hidden="true">
                    <div class="site-header__logo-ring site-header__logo-ring--outer"></div>
                    <div class="site-header__logo-ring site-header__logo-ring--inner"></div>
                    <div class="site-header__logo-bar"></div>
                </div>
                <span class="site-header__wordmark">Jutis</span>
            </a>
            <nav class="site-header__nav" aria-label="Primary navigation">
                <a href="feature.html">Features</a>
                <a href="security.html">Security</a>
                <a href="developers/index.html">Developers</a>
                <a href="docs/index.html">Docs</a>
                <a href="blog/index.html">Blog</a>
                <a href="partner/index.html">Partner</a>
            </nav>
            <div class="site-header__actions">
                <a href="login.html" class="site-header__login" aria-current="page">Login</a>
                <a href="signup.html" class="btn-signup">Get Started</a>
            </div>
        </div>
    </header>
    <div class="site-header__top-accent" aria-hidden="true"></div>

    <!-- AUTH FORM -->
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo" aria-hidden="true">
                    <div class="auth-logo__mark">
                        <div class="auth-logo__ring auth-logo__ring--outer"></div>
                        <div class="auth-logo__ring auth-logo__ring--inner"></div>
                        <div class="auth-logo__bar"></div>
                    </div>
                </div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your Jutis wallet</p>
            </div>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>

                <div class="form-row form-row--between">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" class="checkbox-input">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <a href="#" class="form-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn--accent btn--lg" style="width: 100%;">Sign In</button>

                <div class="divider">
                    <span class="divider-text">or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn btn--social">
                        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Google
                    </button>
                    <button type="button" class="btn btn--social">
                        <svg class="social-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        GitHub
                    </button>
                </div>
            </form>

            <p class="auth-footer-text">
                Don't have an account? <a href="signup.html" class="form-link">Sign up</a>
            </p>
        </div>
    </main>

    <!-- TOP ACCENT LINE -->
    <div class="top-accent" aria-hidden="true"></div>

</body>
</html>
