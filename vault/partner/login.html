<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Partner Login — Jutis</title>
    <meta name="description" content="Partner login for Jutis affiliate program.">
    <meta name="robots" noindex>

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Partner Login — Jutis">
    <meta property="og:image" content="../og-image.svg">
    <meta property="og:site_name" content="Jutis">

    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>

<body class="page page--auth">

    <div class="top-accent" aria-hidden="true"></div>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 420px;">

            <!-- Wordmark -->
            <div class="auth-logo">
                <a href="index.html" class="auth-logo__link">
                    <div class="auth-logo__mark" aria-hidden="true">
                        <div class="auth-logo__ring auth-logo__ring--outer"></div>
                        <div class="auth-logo__ring auth-logo__ring--inner"></div>
                        <div class="auth-logo__bar"></div>
                    </div>
                </a>
            </div>

            <div class="auth-header">
                <span class="auth-header__badge">Partner Portal</span>
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your partner account</p>
            </div>

            <form class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="partner@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <div class="form-row">
                    <label class="checkbox-label">
                        <input type="checkbox" class="checkbox-input">
                        <span class="checkbox-text">Remember me</span>
                    </label>
                    <a href="#" class="form-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn--accent btn--lg w-full">Sign In</button>
            </form>

            <div class="divider">
                <span class="divider-text"></span>
            </div>

            <p class="auth-footer-text">
                Not a partner yet? <a href="signup.html" class="form-link">Apply as Partner</a>
            </p>

            <div class="auth-back-link">
                <a href="../index.html" class="form-link">
                    <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
                    Back to Jutis
                </a>
            </div>

        </div>
    </div>

    <style>
    .auth-logo {
        display: flex;
        justify-content: center;
        margin-bottom: var(--space-6);
    }

    .auth-logo__link {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .auth-logo__mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-logo__ring {
        position: absolute;
        border-radius: 12px;
        border: 2px solid var(--accent);
    }

    .auth-logo__ring--outer {
        inset: 0;
        transform: rotate(45deg) scale(0.9);
    }

    .auth-logo__ring--inner {
        inset: 5px;
        border-color: rgba(230, 232, 236, 0.25);
        transform: rotate(12deg);
    }

    .auth-logo__bar {
        position: relative;
        z-index: 1;
        width: 6px;
        height: 22px;
        background-color: var(--accent);
        border-radius: 3px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--space-6);
    }

    .auth-header__badge {
        display: inline-block;
        padding: var(--space-1) var(--space-3);
        background: var(--accent-10);
        border: 1px solid var(--accent-20);
        border-radius: var(--radius-pill);
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: var(--tracking-wide);
        margin-bottom: var(--space-4);
    }

    .auth-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: var(--text-2xl);
        margin-bottom: var(--space-2);
    }

    .auth-subtitle {
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
    }

    .form-label {
        font-size: var(--text-sm);
        font-weight: 500;
    }

    .form-input {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        background-color: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--fg-primary);
        font-size: var(--text-base);
        transition: border-color var(--duration-fast) var(--ease-out);
    }

    .form-input::placeholder {
        color: var(--fg-muted);
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-30);
    }

    .form-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
    }

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        cursor: pointer;
    }

    .checkbox-input {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
    }

    .checkbox-text {
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .form-link {
        font-size: var(--text-sm);
        color: var(--accent);
        text-decoration: none;
        transition: opacity var(--duration-fast) var(--ease-out);
    }

    .form-link:hover {
        opacity: 0.8;
    }

    .btn--accent {
        background-color: var(--accent);
        color: var(--bg-main);
        font-weight: 700;
    }

    .btn--accent:hover {
        background-color: var(--fg-primary);
    }

    .btn--ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--fg-primary);
    }

    .btn--lg {
        font-size: var(--text-base);
        padding: var(--space-3) var(--space-6);
    }

    .w-full {
        width: 100%;
    }

    .divider {
        position: relative;
        display: flex;
        align-items: center;
        margin: var(--space-4) 0;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background-color: var(--border);
    }

    .divider-text {
        padding-inline: var(--space-4);
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .auth-footer-text {
        text-align: center;
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .auth-back-link {
        text-align: center;
        margin-top: var(--space-4);
    }

    .auth-back-link .form-link {
        display: inline-flex;
        align-items: center;
        gap: var(--space-1);
        font-size: var(--text-sm);
    }

    .auth-back-link .material-symbols-outlined {
        font-size: 16px;
    }
    </style>

</body>
</html>
