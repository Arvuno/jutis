<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Partner Signup — Jutis</title>
    <meta name="description" content="Apply to the Jutis partner program.">
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Partner Signup — Jutis">
    <meta property="og:image" content="../og-image.svg">
    <meta property="og:site_name" content="Jutis">

    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>

<body class="page page--auth">

    <div class="top-accent" aria-hidden="true"></div>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 480px;">

            <div class="auth-logo">
                <a href="index.html" class="auth-logo__link">
                    <div class="auth-logo__mark" aria-hidden="true">
                        <div class="auth-logo__ring auth-logo__ring--outer"></div>
                        <div class="auth-logo__ring auth-logo__ring--inner"></div>
                        <div class="auth-logo__bar"></div>
                    </div>
                </a>
            </div>

            <div class="auth-header">
                <span class="auth-header__badge">Partner Program</span>
                <h1 class="auth-title">Apply as Partner</h1>
                <p class="auth-subtitle">Tell us about yourself. Applications are reviewed by the Jutis team within 1–3 business days.</p>
            </div>

            <form class="auth-form" onsubmit="return false;">
                <div class="form-row-2col">
                    <div class="form-group">
                        <label class="form-label" for="partnerName">Partner Name</label>
                        <input type="text" id="partnerName" class="form-input" placeholder="Your name or org">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="slug">Preferred Partner Slug</label>
                        <div class="input-prefix-wrap">
                            <span class="input-prefix">jutis.xyz/</span>
                            <input type="text" id="slug" class="form-input input-prefix-input" placeholder="yourname">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="partner@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="website">Website or Community Link</label>
                    <input type="url" id="website" class="form-input" placeholder="https://">
                </div>
                <div class="form-row-2col">
                    <div class="form-group">
                        <label class="form-label" for="audience">Audience Size</label>
                        <select id="audience" class="form-input">
                            <option>Select range</option>
                            <option>Under 500</option>
                            <option>500 – 2,000</option>
                            <option>2,000 – 10,000</option>
                            <option>10,000 – 50,000</option>
                            <option>50,000+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="payout">Payout Method</label>
                        <select id="payout" class="form-input">
                            <option>Canton Wallet Address</option>
                            <option>Other (coming soon)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reason">Why do you want to partner with Jutis?</label>
                    <textarea id="reason" class="form-input" rows="3" placeholder="Tell us about your audience and how you plan to promote Jutis..." style="resize: vertical;"></textarea>
                </div>
                <button type="submit" class="btn btn--accent btn--lg w-full">Submit Application</button>
            </form>

            <p class="auth-note">
                <span class="material-symbols-outlined" aria-hidden="true">info</span>
                Applications are reviewed by the Jutis team. You'll receive an email once your partner account is approved.
            </p>

            <p class="auth-footer-text">
                Already a partner? <a href="login.html" class="form-link">Sign In</a>
            </p>

        </div>
    </div>

    <style>
    .auth-logo {
        display: flex;
        justify-content: center;
        margin-bottom: var(--space-6);
    }

    .auth-logo__link {
        display: flex;
        align-items: center;
        text-decoration: none;
    }

    .auth-logo__mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-logo__ring {
        position: absolute;
        border-radius: 12px;
        border: 2px solid var(--accent);
    }

    .auth-logo__ring--outer {
        inset: 0;
        transform: rotate(45deg) scale(0.9);
    }

    .auth-logo__ring--inner {
        inset: 5px;
        border-color: rgba(230, 232, 236, 0.25);
        transform: rotate(12deg);
    }

    .auth-logo__bar {
        position: relative;
        z-index: 1;
        width: 6px;
        height: 22px;
        background-color: var(--accent);
        border-radius: 3px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--space-6);
    }

    .auth-header__badge {
        display: inline-block;
        padding: var(--space-1) var(--space-3);
        background: var(--accent-10);
        border: 1px solid var(--accent-20);
        border-radius: var(--radius-pill);
        font-size: var(--text-xs);
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: var(--tracking-wide);
        margin-bottom: var(--space-4);
    }

    .auth-title {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: var(--text-2xl);
        margin-bottom: var(--space-2);
    }

    .auth-subtitle {
        font-size: var(--text-sm);
        color: var(--fg-secondary);
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: var(--space-5);
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
    }

    .form-label {
        font-size: var(--text-sm);
        font-weight: 500;
    }

    .form-input {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        background-color: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--fg-primary);
        font-size: var(--text-base);
        transition: border-color var(--duration-fast) var(--ease-out);
    }

    .form-input::placeholder {
        color: var(--fg-muted);
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-30);
    }

    .form-row-2col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-4);
    }

    @media (max-width: 480px) {
        .form-row-2col { grid-template-columns: 1fr; }
    }

    .input-prefix-wrap {
        display: flex;
        align-items: center;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        overflow: hidden;
        transition: border-color var(--duration-fast) var(--ease-out);
    }

    .input-prefix-wrap:focus-within {
        border-color: var(--accent-30);
    }

    .input-prefix {
        padding: var(--space-3) var(--space-3);
        background: var(--bg-inset);
        font-size: var(--text-sm);
        color: var(--fg-secondary);
        white-space: nowrap;
        border-right: 1px solid var(--border);
    }

    .input-prefix-input {
        border: none;
        background: transparent;
        flex: 1;
    }

    .input-prefix-input:focus {
        outline: none;
    }

    textarea.form-input {
        resize: vertical;
        min-height: 80px;
    }

    select.form-input {
        cursor: pointer;
    }

    .form-link {
        font-size: var(--text-sm);
        color: var(--accent);
        text-decoration: none;
        transition: opacity var(--duration-fast) var(--ease-out);
    }

    .form-link:hover {
        opacity: 0.8;
    }

    .btn--accent {
        background-color: var(--accent);
        color: var(--bg-main);
        font-weight: 700;
    }

    .btn--accent:hover {
        background-color: var(--fg-primary);
    }

    .btn--lg {
        font-size: var(--text-base);
        padding: var(--space-3) var(--space-6);
    }

    .w-full {
        width: 100%;
    }

    .auth-note {
        display: flex;
        align-items: flex-start;
        gap: var(--space-2);
        padding: var(--space-4);
        background: var(--info-bg);
        border: 1px solid var(--info-border);
        border-radius: var(--radius-md);
        font-size: var(--text-xs);
        color: var(--info);
        margin-top: var(--space-4);
    }

    .auth-note .material-symbols-outlined {
        font-size: 16px;
        flex-shrink: 0;
        margin-top: 1px;
    }

    .auth-footer-text {
        text-align: center;
        font-size: var(--text-sm);
        color: var(--fg-secondary);
        margin-top: var(--space-4);
    }
    </style>

</body>
</html>
